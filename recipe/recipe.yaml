schema_version: 1

context:
  name: resolvo-cpp
  version: 0.4.0

package:
  name: ${{ name }}
  version: ${{ version }}

source:
  url: https://github.com/prefix-dev/resolvo/archive/refs/tags/resolvo_cpp-v${{ version }}.zip
  sha256: 897efde3dd3be52cb0bc3c90a271b8bcfd9f1b9ff6b51477b7bbe1735c781680

build:
  number: 0
  script:
    interpreter: brush
    content: |
      set -ex
      cmake ${CMAKE_ARGS} -GNinja "$SRC_DIR" \
        ${CARGO_BUILD_TARGET:+-DRust_CARGO_TARGET=$CARGO_BUILD_TARGET}
      cmake --build . --target install
      cargo-bundle-licenses --format yaml --output THIRDPARTY.yml

requirements:
  build:
    - ${{ stdlib('c') }}
    - ${{ compiler('cxx') }}
    - ${{ compiler('rust') }}
    - cmake
    - ninja
    - cargo-bundle-licenses
    - corrosion
    - brush
  run_exports:
    - ${{ pin_subpackage('resolvo-cpp', upper_bound='x.x') }}

tests:
  - package_contents:
      include:
        - resolvo/resolvo.h
        - resolvo/resolvo_internal.h
      lib:
        # On Windows the import library keeps its natural name
        # (resolvo_cpp.dll.lib), so name the DLL and import lib explicitly.
        - if: win
          then:
            - resolvo_cpp.dll
            - resolvo_cpp.dll.lib
          else:
            - resolvo_cpp
      files:
        - if: win
          then:
            - Library/lib/cmake/Resolvo/ResolvoTargets.cmake
            - Library/lib/cmake/Resolvo/ResolvoConfigVersion.cmake
            - Library/lib/cmake/Resolvo/ResolvoConfig.cmake
          else:
            - lib/cmake/Resolvo/ResolvoTargets.cmake
            - lib/cmake/Resolvo/ResolvoConfigVersion.cmake
            - lib/cmake/Resolvo/ResolvoConfig.cmake
  # Build and run the bundled sudoku example against the installed package to
  # verify that the headers, shared library and CMake config work together.
  - script:
      interpreter: brush
      content: |
        set -ex
        cmake -G Ninja -S cpp/examples/sudoku -B build-sudoku ${CMAKE_ARGS}
        cmake --build build-sudoku
        ./build-sudoku/sudoku
    files:
      source:
        - cpp/examples/sudoku
    requirements:
      build:
        - ${{ compiler('cxx') }}
        - ${{ stdlib('c') }}
        - cmake
        - ninja
        - brush

about:
  license: BSD-3-Clause
  license_file:
    - LICENSE
    - THIRDPARTY.yml
  summary: C++ bindings for resolvo, a universal package resolver.
  homepage: https://github.com/prefix-dev/resolvo
  repository: https://github.com/prefix-dev/resolvo

extra:
  feedstock-name: resolvo-cpp
  recipe-maintainers:
    - baszalmstra
    - jjerphan
